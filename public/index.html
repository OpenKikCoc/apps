<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binacs Apps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .app-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            height: 100%;
        }
        .app-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .app-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="bi bi-grid-3x3-gap-fill"></i> Binacs Apps</a>
        </div>
    </nav>

    <div class="container">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <!-- Medician Card -->
            <div class="col">
                <a href="/medician/" class="card app-card border-0 shadow-sm">
                    <div class="card-body text-center p-5">
                        <div class="app-icon text-success">
                            <i class="bi bi-capsule"></i>
                        </div>
                        <h3 class="card-title">Medician</h3>
                        <p class="card-text text-muted">家庭药箱管理系统</p>
                    </div>
                </a>
            </div>

            <!-- Pastebin Card -->
            <div class="col">
                <a href="/pastebin/" class="card app-card border-0 shadow-sm">
                    <div class="card-body text-center p-5">
                        <div class="app-icon text-dark">
                            <i class="bi bi-file-earmark-code"></i>
                        </div>
                        <h3 class="card-title">Pastebin</h3>
                        <p class="card-text text-muted">代码片段与笔记</p>
                    </div>
                </a>
            </div>

            <!-- Memos Card -->
            <div class="col">
                <a href="/memos/" class="card app-card border-0 shadow-sm">
                    <div class="card-body text-center p-5">
                        <div class="app-icon text-warning">
                            <i class="bi bi-sticky"></i>
                        </div>
                        <h3 class="card-title">Memos</h3>
                        <p class="card-text text-muted">随手记备忘录</p>
                    </div>
                </a>
            </div>

            <!-- Subscriptions Card -->
            <div class="col">
                <a href="/subscriptions/" class="card app-card border-0 shadow-sm">
                    <div class="card-body text-center p-5">
                        <div class="app-icon text-primary">
                            <i class="bi bi-credit-card-2-front"></i>
                        </div>
                        <h3 class="card-title">Subscriptions</h3>
                        <p class="card-text text-muted">家庭订阅管家</p>
                    </div>
                </a>
            </div>

            <!-- AI Chat Card -->
            <div class="col">
                <a href="/ai-chat/" class="card app-card border-0 shadow-sm">
                    <div class="card-body text-center p-5">
                        <div class="app-icon text-info">
                            <i class="bi bi-robot"></i>
                        </div>
                        <h3 class="card-title">AI Chat</h3>
                        <p class="card-text text-muted">智能对话助手</p>
                    </div>
                </a>
            </div>

            <!-- Placeholder for future apps -->
            <div class="col">
                <div class="card app-card border-0 shadow-sm opacity-50" style="cursor: default;">
                    <div class="card-body text-center p-5">
                        <div class="app-icon text-secondary">
                            <i class="bi bi-plus-circle-dotted"></i>
                        </div>
                        <h3 class="card-title">Coming Soon</h3>
                        <p class="card-text text-muted">更多应用开发中...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted mt-5 py-4">
        <small>&copy; 2026 Binacs Apps</small>
    </footer>
</body>
</html>
