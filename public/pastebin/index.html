<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastebin - Binacs Apps</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Markdown & Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/github-dark.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <style>
        [v-cloak] { display: none; }
        .editor-container { height: 70vh; }
        textarea.form-control { height: 100%; font-family: monospace; resize: none; }
        .preview-content { 
            height: 100%; 
            overflow-y: auto; 
            background: #f8f9fa; 
            padding: 1rem; 
            border-radius: 0.375rem; 
            border: 1px solid #dee2e6;
        }
        /* Markdown Styles */
        .preview-content pre { background: #0d1117; padding: 1em; border-radius: 6px; color: #c9d1d9; }
        .preview-content code { font-family: Consolas, Monaco, 'Andale Mono', 'Ubuntu Mono', monospace; }
    </style>
</head>
<body class="bg-light">
    <div id="app" v-cloak>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 sticky-top">
            <div class="container">
                <a class="navbar-brand" href="/pastebin/"><i class="bi bi-file-earmark-code"></i> Pastebin</a>
                <div class="d-flex gap-2 align-items-center">
                    <a href="/" class="btn btn-outline-light btn-sm border-0">
                        <i class="bi bi-house-door"></i> 首页
                    </a>
                    <button v-if="viewMode === 'view'" class="btn btn-outline-light btn-sm" @click="createNew">
                        <i class="bi bi-plus-lg"></i> 新建
                    </button>
                    <button v-if="viewMode === 'edit'" class="btn btn-light btn-sm text-primary fw-bold" @click="savePaste" :disabled="saving">
                        <i class="bi bi-save"></i> {{ saving ? '保存中...' : '保存' }}
                    </button>
                </div>
            </div>
        </nav>

        <div class="container">
            <!-- Edit Mode -->
            <div v-if="viewMode === 'edit'">
                <div class="row mb-3">
                    <div class="col-md-3">
                        <select class="form-select" v-model="language">
                            <option value="markdown">Markdown</option>
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="json">JSON</option>
                            <option value="html">HTML</option>
                            <option value="css">CSS</option>
                            <option value="sql">SQL</option>
                            <option value="text">Plain Text</option>
                        </select>
                    </div>
                    <div class="col-md-9 text-end">
                        <span class="text-muted small">支持 Markdown 预览</span>
                    </div>
                </div>
                <div class="row editor-container">
                    <div class="col-md-6 h-100">
                        <textarea class="form-control" v-model="content" placeholder="在此输入内容..."></textarea>
                    </div>
                    <div class="col-md-6 h-100 d-none d-md-block">
                        <div class="preview-content" v-html="renderedContent"></div>
                    </div>
                </div>
            </div>

            <!-- View Mode -->
            <div v-if="viewMode === 'view'">
                <div class="card shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <div>
                            <span class="badge bg-secondary me-2">{{ currentPaste.language }}</span>
                            <small class="text-muted">{{ formatDate(currentPaste.created_at) }}</small>
                        </div>
                        <div class="btn-group">
                            <button class="btn btn-sm btn-outline-primary" @click="copyContent">
                                <i class="bi bi-clipboard"></i> 复制
                            </button>
                            <button class="btn btn-sm btn-outline-danger" @click="deletePaste(currentPaste.id)">
                                <i class="bi bi-trash"></i> 删除
                            </button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="preview-content bg-white border-0" v-html="renderedViewContent"></div>
                    </div>
                </div>
            </div>

            <!-- Recent Pastes (Always shown) -->
            <div class="mt-5 mb-5" v-if="recentPastes.length > 0">
                <h5 class="mb-3 border-bottom pb-2">
                    <i class="bi bi-clock-history"></i> 最近记录
                </h5>
                <div class="list-group">
                    <div v-for="paste in recentPastes" :key="paste.id" 
                       class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
                       :class="{ 'active': currentPaste && currentPaste.id === paste.id }">
                        <a :href="'?id=' + paste.id" class="d-flex align-items-center text-truncate text-decoration-none text-reset flex-grow-1" style="max-width: 80%;">
                            <span class="badge bg-secondary me-2 rounded-pill" style="font-size: 0.7em; min-width: 60px;">{{ paste.language }}</span>
                            <span class="text-truncate">{{ paste.snippet || '无内容' }}</span>
                        </a>
                        <button class="btn btn-sm btn-link text-danger p-0 ms-2" @click.stop="deletePaste(paste.id)" title="删除">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp, computed, ref, onMounted } = Vue;

        createApp({
            setup() {
                const viewMode = ref('edit'); // 'edit' or 'view'
                const content = ref('');
                const language = ref('markdown');
                const saving = ref(false);
                const currentPaste = ref(null);
                const recentPastes = ref([]);

                // Configure marked
                marked.setOptions({
                    highlight: function(code, lang) {
                        const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                        return hljs.highlight(code, { language }).value;
                    },
                    langPrefix: 'hljs language-'
                });

                const renderedContent = computed(() => {
                    if (!content.value) return '<p class="text-muted text-center mt-5">预览区域</p>';
                    if (language.value === 'markdown') {
                        return marked.parse(content.value);
                    } else {
                        // For code, wrap in pre code block
                        const highlighted = hljs.highlight(content.value, { language: language.value }).value;
                        return `<pre><code class="hljs language-${language.value}">${highlighted}</code></pre>`;
                    }
                });

                const renderedViewContent = computed(() => {
                    if (!currentPaste.value) return '';
                    const { content: text, language: lang } = currentPaste.value;
                    if (lang === 'markdown') {
                        return marked.parse(text);
                    } else {
                        const highlighted = hljs.highlight(text, { language: lang }).value;
                        return `<pre><code class="hljs language-${lang}">${highlighted}</code></pre>`;
                    }
                });

                const getApiUrl = (endpoint) => {
                    const basePath = window.location.pathname.startsWith('/pastebin') ? '/pastebin/api' : '/api';
                    return `${basePath}${endpoint}`;
                };

                const fetchPaste = async (id) => {
                    try {
                        const res = await fetch(getApiUrl(`/paste?id=${id}`));
                        if (res.ok) {
                            currentPaste.value = await res.json();
                            viewMode.value = 'view';
                            document.title = `Paste ${id} - Pastebin`;
                        } else {
                            alert('Paste not found');
                            window.location.href = '/pastebin/';
                        }
                    } catch (e) {
                        console.error(e);
                    }
                };

                const fetchRecent = async () => {
                    try {
                        const res = await fetch(getApiUrl('/paste'));
                        if (res.ok) {
                            recentPastes.value = await res.json();
                        }
                    } catch (e) {
                        console.error(e);
                    }
                };

                const savePaste = async () => {
                    if (!content.value) return;
                    saving.value = true;
                    try {
                        const res = await fetch(getApiUrl('/paste'), {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                content: content.value,
                                language: language.value
                            })
                        });
                        const data = await res.json();
                        if (data.success) {
                            window.location.href = `?id=${data.id}`;
                        } else {
                            alert('保存失败: ' + data.error);
                        }
                    } catch (e) {
                        alert('网络错误');
                    } finally {
                        saving.value = false;
                    }
                };

                const deletePaste = async (id) => {
                    if (!confirm('确定要删除这条记录吗？')) return;
                    
                    try {
                        const res = await fetch(getApiUrl(`/paste?id=${id}`), {
                            method: 'DELETE'
                        });
                        
                        if (res.ok) {
                            // If we are viewing the deleted paste, go back to create mode
                            if (currentPaste.value && currentPaste.value.id === id) {
                                window.location.href = '/pastebin/';
                            } else {
                                // Just refresh the list
                                fetchRecent();
                            }
                        } else {
                            alert('删除失败');
                        }
                    } catch (e) {
                        console.error(e);
                        alert('网络错误');
                    }
                };

                const createNew = () => {
                    window.location.href = '/pastebin/';
                };

                const copyContent = () => {
                    if (currentPaste.value) {
                        navigator.clipboard.writeText(currentPaste.value.content);
                        alert('已复制到剪贴板');
                    }
                };

                const formatDate = (ts) => {
                    return new Date(ts).toLocaleString();
                };

                onMounted(() => {
                    const params = new URLSearchParams(window.location.search);
                    const id = params.get('id');
                    
                    // Always fetch recent pastes
                    fetchRecent();

                    if (id) {
                        fetchPaste(id);
                    }
                });

                return {
                    viewMode, content, language, saving, currentPaste, recentPastes,
                    renderedContent, renderedViewContent,
                    savePaste, createNew, copyContent, deletePaste, formatDate
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
