<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medician - 家庭药箱</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <style>
        .card-medicine { transition: transform 0.2s; }
        .card-medicine:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .cursor-pointer { cursor: pointer; }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="bg-light">
    <div id="app" v-cloak>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 sticky-top">
            <div class="container">
                <a class="navbar-brand" href="#" @click="resetView"><i class="bi bi-capsule"></i> Medician</a>
                <div class="d-flex gap-2 align-items-center">
                    <a href="/" class="btn btn-outline-light btn-sm border-0">
                        <i class="bi bi-house-door"></i> 首页
                    </a>
                    <button class="btn btn-outline-light btn-sm" @click="view = 'list'">
                        <i class="bi bi-list-ul"></i> 列表
                    </button>
                    <button class="btn btn-outline-light btn-sm" @click="view = 'add'">
                        <i class="bi bi-plus-circle"></i> 添加
                    </button>
                    <button class="btn btn-outline-light btn-sm" @click="copyContext">
                        <i class="bi bi-robot"></i> AI
                    </button>
                </div>
            </div>
        </nav>

        <div class="container">
            <!-- View: List -->
            <div v-if="view === 'list'">
                <!-- Header & Search -->
                <div class="row mb-4">
                    <div class="col-md-8">
                        <h2><i class="bi bi-box-seam"></i> 药品库存 ({{ filteredItems.length }})</h2>
                    </div>
                    <div class="col-md-4">
                        <div class="input-group">
                            <input type="text" class="form-control" v-model="searchQuery" placeholder="搜索药品或症状...">
                            <button class="btn btn-outline-primary" type="button"><i class="bi bi-search"></i></button>
                        </div>
                    </div>
                </div>

                <!-- Filters & Tags -->
                <div class="mb-4">
                    <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
                        <span class="fw-bold"><i class="bi bi-funnel"></i> 筛选:</span>
                        
                        <div class="btn-group btn-group-sm" role="group">
                            <button @click="sortBy = 'name'" class="btn btn-outline-secondary" :class="{ active: sortBy === 'name' }">按名称</button>
                            <button @click="sortBy = 'expiry'" class="btn btn-outline-secondary" :class="{ active: sortBy === 'expiry' }">按过期时间</button>
                        </div>

                        <button @click="showExpired = !showExpired" class="btn btn-sm btn-outline-danger" :class="{ active: showExpired }">
                            {{ showExpired ? '显示全部' : '只看过期' }}
                        </button>
                        
                        <button class="btn btn-sm btn-primary ms-auto" @click="view = 'add'"><i class="bi bi-plus-lg"></i> 添加药品</button>
                    </div>

                    <!-- Symptom Tags Cloud -->
                    <div v-if="allTags.length > 0" class="d-flex flex-wrap gap-2 p-3 bg-white rounded shadow-sm border">
                        <span class="text-muted small align-self-center">按症状筛选:</span>
                        <span @click="selectedTag = null" class="badge rounded-pill text-decoration-none cursor-pointer" :class="!selectedTag ? 'bg-primary' : 'bg-light text-dark border'">全部</span>
                        <span v-for="tag in allTags" :key="tag" @click="selectedTag = tag" 
                              class="badge rounded-pill text-decoration-none cursor-pointer" 
                              :class="selectedTag === tag ? 'bg-primary' : 'bg-info text-dark bg-opacity-10 border border-info'">
                            {{ tag }}
                        </span>
                    </div>
                </div>
                
                <!-- Items Grid -->
                <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                    <div class="col" v-for="item in filteredItems" :key="item.id">
                        <div class="card h-100 card-medicine" :class="'border-' + getStatus(item).class">
                            <div class="card-header bg-transparent d-flex justify-content-between align-items-center">
                                <span class="badge" :class="'bg-' + getStatus(item).class">{{ getStatus(item).text }}</span>
                                <small class="text-muted">有效期: {{ item.expiry_date }}</small>
                            </div>
                            <div class="card-body">
                                <h5 class="card-title">{{ item.name }}</h5>
                                <h6 class="card-subtitle mb-2 text-muted" v-if="item.brand">{{ item.brand }}</h6>
                                <p class="card-text mb-2">
                                    <strong>数量:</strong> {{ item.quantity }} {{ item.unit }}<br>
                                    <strong>规格:</strong> {{ item.dosage || '-' }}
                                </p>
                                <div v-if="item.indications && item.indications.length" class="mt-2">
                                    <span v-for="tag in item.indications" :key="tag" 
                                          @click.stop="selectedTag = tag"
                                          class="badge bg-light text-secondary border me-1 cursor-pointer hover-shadow">
                                        {{ tag }}
                                    </span>
                                </div>
                            </div>
                            <div class="card-footer bg-transparent text-end">
                                <button class="btn btn-sm btn-outline-danger" @click="deleteItem(item.id)">
                                    <i class="bi bi-trash"></i> 删除
                                </button>
                            </div>
                        </div>
                    </div>
                    <div v-if="filteredItems.length === 0" class="col-12 text-center py-5 text-muted">
                        <p class="mb-3">没有找到匹配的药品。</p>
                        <button v-if="selectedTag || searchQuery || showExpired" class="btn btn-outline-primary" @click="resetFilters">清除筛选</button>
                        <button v-else class="btn btn-primary" @click="view = 'add'">添加药品</button>
                    </div>
                </div>
            </div>

            <!-- View: Add -->
            <div v-if="view === 'add'">
                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4 class="mb-0">添加新药品</h4>
                            <button class="btn btn-outline-secondary btn-sm" @click="view = 'list'">返回列表</button>
                        </div>
                        
                        <div class="card shadow-sm">
                            <div class="card-body">
                                <!-- Image Upload Section -->
                                <div class="mb-4 p-4 border rounded bg-light text-center position-relative" style="border-style: dashed !important; border-width: 2px;">
                                    <div v-if="!scanning && !showCamera">
                                        <i class="bi bi-cloud-upload display-4 text-muted"></i>
                                        <p class="mt-2 text-muted">点击上传或拍照识别</p>
                                        <div class="d-flex justify-content-center gap-2">
                                            <input type="file" ref="fileInput" @change="handleFileUpload" accept="image/*" class="d-none">
                                            <button class="btn btn-outline-primary" @click="$refs.fileInput.click()">
                                                <i class="bi bi-folder"></i> 选择文件
                                            </button>
                                            <button class="btn btn-outline-success" @click="startCamera">
                                                <i class="bi bi-camera"></i> 拍照
                                            </button>
                                        </div>
                                    </div>

                                    <div v-if="scanning" class="text-primary py-4">
                                        <div class="spinner-border" role="status"></div>
                                        <p class="mt-2">正在识别药品信息...</p>
                                    </div>

                                    <!-- Camera Preview -->
                                    <div v-if="showCamera" class="position-relative">
                                        <video ref="video" width="100%" autoplay playsinline class="rounded bg-black" style="max-height: 300px; object-fit: cover;"></video>
                                        <div class="mt-2">
                                            <button class="btn btn-danger rounded-circle" @click="snapPhoto" style="width:50px;height:50px"><i class="bi bi-camera-fill"></i></button>
                                            <button class="btn btn-secondary ms-2" @click="stopCamera">取消</button>
                                        </div>
                                    </div>
                                </div>

                                <form @submit.prevent="submitForm">
                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <label class="form-label">药品名称 *</label>
                                            <input type="text" class="form-control" v-model="form.name" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">品牌</label>
                                            <input type="text" class="form-control" v-model="form.brand">
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">数量 *</label>
                                            <input type="number" class="form-control" v-model="form.quantity" required>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">单位</label>
                                            <select class="form-select" v-model="form.unit">
                                                <option>盒</option><option>瓶</option><option>板</option><option>支</option><option>袋</option>
                                            </select>
                                        </div>
                                        <div class="col-md-4">
                                            <label class="form-label">有效期至 *</label>
                                            <input type="date" class="form-control" v-model="form.expiry_date" required>
                                        </div>
                                        <div class="col-md-6">
                                            <label class="form-label">规格</label>
                                            <input type="text" class="form-control" v-model="form.dosage" placeholder="例如: 0.3g">
                                        </div>
                                        <div class="col-12">
                                            <label class="form-label">适应症 (逗号分隔)</label>
                                            <textarea class="form-control" v-model="form.indications_str" rows="2" placeholder="头痛, 发热, 鼻塞"></textarea>
                                        </div>
                                    </div>
                                    <div class="mt-4 d-flex justify-content-end gap-2">
                                        <button type="button" class="btn btn-light" @click="resetForm">重置</button>
                                        <button type="submit" class="btn btn-primary">保存药品</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    view: 'list',
                    items: [],
                    searchQuery: '',
                    selectedTag: null,
                    showExpired: false,
                    sortBy: 'name', // 'name' or 'expiry'
                    scanning: false,
                    showCamera: false,
                    stream: null,
                    form: {
                        name: '', quantity: 1, unit: '盒', expiry_date: '', 
                        dosage: '', indications_str: '', brand: ''
                    }
                }
            },
            computed: {
                allTags() {
                    const tags = new Set();
                    this.items.forEach(item => {
                        if (item.indications) {
                            item.indications.forEach(tag => tags.add(tag));
                        }
                    });
                    return Array.from(tags).sort();
                },
                filteredItems() {
                    let result = this.items;
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);

                    // 1. Filter by Expired
                    if (this.showExpired) {
                        result = result.filter(item => new Date(item.expiry_date) < today);
                    }

                    // 2. Filter by Tag
                    if (this.selectedTag) {
                        result = result.filter(item => item.indications && item.indications.includes(this.selectedTag));
                    }

                    // 3. Filter by Search
                    if (this.searchQuery) {
                        const q = this.searchQuery.toLowerCase();
                        result = result.filter(i => 
                            i.name.toLowerCase().includes(q) || 
                            (i.brand && i.brand.toLowerCase().includes(q)) ||
                            (i.indications && i.indications.some(t => t.toLowerCase().includes(q)))
                        );
                    }

                    // 4. Sort
                    result.sort((a, b) => {
                        if (this.sortBy === 'expiry') {
                            return new Date(a.expiry_date) - new Date(b.expiry_date);
                        } else {
                            return a.name.localeCompare(b.name, 'zh-CN');
                        }
                    });

                    return result;
                }
            },
            mounted() {
                this.fetchItems();
            },
            methods: {
                getApiUrl(endpoint) {
                    // Determine base path dynamically to support both standalone and monorepo deployment
                    const basePath = window.location.pathname.startsWith('/medician') ? '/medician/api' : '/api';
                    return `${basePath}${endpoint}`;
                },
                async fetchItems() {
                    try {
                        const res = await fetch(this.getApiUrl('/inventory'));
                        if (res.ok) {
                            this.items = await res.json();
                        } else {
                            console.error("Failed to fetch inventory");
                        }
                    } catch (e) {
                        console.error("Network error fetching inventory", e);
                    }
                },
                getStatus(item) {
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const expiry = new Date(item.expiry_date);
                    const diffTime = expiry - today;
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                    
                    if (diffDays < 0) return { class: 'danger', text: 'Expired' };
                    if (diffDays < 30) return { class: 'warning', text: 'Expiring Soon' };
                    return { class: 'success', text: 'OK' };
                },
                async deleteItem(id) {
                    if(!confirm('确定删除?')) return;
                    await fetch(this.getApiUrl(`/item?id=${id}`), { method: 'DELETE' });
                    this.fetchItems();
                },
                async handleFileUpload(e) {
                    const file = e.target.files[0];
                    if(!file) return;
                    this.scanFile(file);
                },
                async scanFile(file) {
                    this.scanning = true;
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    try {
                        const res = await fetch(this.getApiUrl('/scan'), { method: 'POST', body: formData });
                        const result = await res.json();
                        if(result.success) {
                            const d = result.data;
                            this.form.name = d.name || '';
                            this.form.quantity = d.quantity || 1;
                            this.form.expiry_date = d.expiry_date || '';
                            this.form.unit = d.unit || '盒';
                            this.form.dosage = d.dosage || '';
                            this.form.brand = d.brand || '';
                            this.form.indications_str = d.indications ? d.indications.join(', ') : '';
                            this.view = 'add'; 
                        }
                    } catch (e) {
                        alert("识别失败: " + e.message);
                    } finally {
                        this.scanning = false;
                    }
                },
                async startCamera() {
                    this.showCamera = true;
                    try {
                        this.stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                        this.$nextTick(() => this.$refs.video.srcObject = this.stream);
                    } catch(e) {
                        alert('无法访问摄像头');
                        this.showCamera = false;
                    }
                },
                stopCamera() {
                    if(this.stream) this.stream.getTracks().forEach(t => t.stop());
                    this.showCamera = false;
                },
                snapPhoto() {
                    const canvas = document.createElement('canvas');
                    const video = this.$refs.video;
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    canvas.toBlob(blob => {
                        this.scanFile(blob);
                        this.stopCamera();
                    }, 'image/jpeg');
                },
                async submitForm() {
                    const payload = {
                        ...this.form,
                        indications: this.form.indications_str.split(/[,，]/).map(s => s.trim()).filter(s => s)
                    };
                    
                    const res = await fetch(this.getApiUrl('/inventory'), {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if(res.ok) {
                        this.resetForm();
                        this.view = 'list';
                        this.fetchItems();
                    } else {
                        alert("保存失败");
                    }
                },
                resetForm() {
                    this.form = { name: '', quantity: 1, unit: '盒', expiry_date: '', dosage: '', indications_str: '', brand: '' };
                },
                resetFilters() {
                    this.searchQuery = '';
                    this.selectedTag = null;
                    this.showExpired = false;
                },
                resetView() {
                    this.view = 'list';
                    this.resetFilters();
                },
                async copyContext() {
                    const context = this.items.map(i => 
                        `- ${i.name} (${i.brand || ''}) | Qty: ${i.quantity}${i.unit} | Exp: ${i.expiry_date} | Use: ${i.indications ? i.indications.join(', ') : ''}`
                    ).join('\n');
                    
                    navigator.clipboard.writeText(context);
                    alert('AI Context Copied!');
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
