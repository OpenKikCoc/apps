<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memos - 备忘录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
    <style>
        .card-memo { transition: transform 0.2s; cursor: pointer; }
        .card-memo:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        [v-cloak] { display: none; }
        .memo-content {
            white-space: pre-wrap;
            display: -webkit-box;
            -webkit-line-clamp: 8;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="bg-light">
    <div id="app" v-cloak>
        <nav class="navbar navbar-expand-lg navbar-dark bg-warning mb-4 sticky-top">
            <div class="container">
                <div class="d-flex align-items-center">
                    <a href="/" class="text-dark me-3 text-decoration-none d-flex align-items-center" title="返回应用中心">
                        <i class="bi bi-arrow-left me-2"></i>
                        <i class="bi bi-grid-3x3-gap-fill fs-4"></i>
                    </a>
                    <a class="navbar-brand text-dark" href="#"><i class="bi bi-sticky-fill"></i> Memos</a>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <button class="btn btn-dark btn-sm" @click="openMemoModal()">
                        <i class="bi bi-plus-lg"></i> 新建
                    </button>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
                <div class="col" v-for="memo in memos" :key="memo.id">
                    <div class="card h-100 shadow-sm card-memo" @click="openMemoModal(memo)">
                        <div class="card-body bg-warning bg-opacity-10">
                            <p class="card-text memo-content">{{ memo.content }}</p>
                        </div>
                        <div class="card-footer bg-transparent text-muted small d-flex justify-content-between border-top-0">
                            <span>{{ formatDate(memo.updated_at) }}</span>
                            <i class="bi bi-pencil-square"></i>
                        </div>
                    </div>
                </div>
                
                <!-- Empty State -->
                <div v-if="memos.length === 0" class="col-12 text-center py-5 text-muted">
                    <div class="display-1 text-warning opacity-25 mb-3"><i class="bi bi-sticky"></i></div>
                    <p class="mb-3">暂无备忘录</p>
                    <button class="btn btn-warning" @click="openMemoModal()">新建备忘</button>
                </div>
            </div>
            
            <!-- Memo Modal -->
            <div v-if="showMemoModal" class="modal fade show d-block" tabindex="-1" style="background: rgba(0,0,0,0.5)">
                <div class="modal-dialog modal-dialog-centered modal-lg">
                    <div class="modal-content">
                        <div class="modal-header bg-warning bg-opacity-25">
                            <h5 class="modal-title">{{ selectedMemo ? '编辑备忘' : '新建备忘' }}</h5>
                            <button type="button" class="btn-close" @click="closeMemoModal"></button>
                        </div>
                        <div class="modal-body p-0">
                            <textarea class="form-control border-0 p-3" v-model="memoForm.content" rows="12" placeholder="在此输入备忘内容..." style="resize: none; box-shadow: none;"></textarea>
                        </div>
                        <div class="modal-footer bg-light">
                            <span class="text-muted small me-auto" v-if="selectedMemo">
                                创建于: {{ formatDate(selectedMemo.created_at) }}
                            </span>
                            <button v-if="selectedMemo" type="button" class="btn btn-outline-danger" @click="deleteMemo(selectedMemo.id)">
                                <i class="bi bi-trash"></i> 删除
                            </button>
                            <button type="button" class="btn btn-secondary" @click="closeMemoModal">取消</button>
                            <button type="button" class="btn btn-warning" @click="saveMemo">保存</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    memos: [],
                    showMemoModal: false,
                    selectedMemo: null,
                    memoForm: { content: '' }
                }
            },
            mounted() {
                this.fetchMemos();
            },
            methods: {
                getApiUrl(endpoint) {
                    // Adjust for local vs production paths if necessary
                    // In Functions, /memos/api/memo maps to functions/memos/api/memo.js
                    return `/memos/api${endpoint}`;
                },
                async fetchMemos() {
                    try {
                        const res = await fetch(this.getApiUrl('/memo'));
                        if (res.ok) {
                            this.memos = await res.json();
                        }
                    } catch (e) {
                        console.error(e);
                    }
                },
                openMemoModal(memo = null) {
                    this.selectedMemo = memo;
                    this.memoForm.content = memo ? memo.content : '';
                    this.showMemoModal = true;
                },
                closeMemoModal() {
                    this.showMemoModal = false;
                    this.selectedMemo = null;
                    this.memoForm.content = '';
                },
                async saveMemo() {
                    if (!this.memoForm.content.trim()) return;
                    
                    const method = this.selectedMemo ? 'PUT' : 'POST';
                    const body = {
                        content: this.memoForm.content,
                        id: this.selectedMemo ? this.selectedMemo.id : undefined
                    };
                    
                    const res = await fetch(this.getApiUrl('/memo'), {
                        method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body)
                    });
                    
                    if (res.ok) {
                        this.closeMemoModal();
                        this.fetchMemos();
                    } else {
                        alert('保存失败');
                    }
                },
                async deleteMemo(id) {
                    if (!confirm('确定删除此备忘?')) return;
                    
                    const res = await fetch(this.getApiUrl(`/memo?id=${id}`), { method: 'DELETE' });
                    if (res.ok) {
                        this.closeMemoModal();
                        this.fetchMemos();
                    } else {
                        alert('删除失败');
                    }
                },
                formatDate(timestamp) {
                    if (!timestamp) return '';
                    const date = new Date(timestamp);
                    return date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
